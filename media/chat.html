<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none';
                 style-src ${cspSource} 'unsafe-inline';
                 script-src 'nonce-${nonce}';
                 img-src ${cspSource} data:;
                 font-src ${cspSource};" />
  <link rel="stylesheet" href="${cssUri}" />
  <title>Everytheme Chat</title>
</head>
<body>
  <header class="topbar">
    <div class="title">Everytheme</div>
    <div class="actions">
      <button id="btn-new" class="icon-btn" title="New chat (Cmd/Ctrl+N)">+</button>
      <button id="btn-toggle-list" class="icon-btn" title="Conversations">☰</button>
      <button id="btn-menu" class="icon-btn" title="Menu">⋯</button>
    </div>
  </header>

  <aside id="conversation-picker" class="picker hidden">
    <div class="picker-header">Conversations</div>
    <ul id="conversation-list" class="conversation-list"></ul>
  </aside>

  <main id="transcript" class="transcript">
    <div id="empty-state" class="empty-state">
      <div class="empty-title">Describe your theme</div>
      <div class="empty-hint">Try one of these, or type your own.</div>
      <div class="empty-chips">
        <button class="chip" data-prompt="Darken the editor background by 10%">Darken the editor background by 10%</button>
        <button class="chip" data-prompt="Create a cyberpunk neon theme">Create a cyberpunk neon theme</button>
        <button class="chip" data-prompt="Make it warm and sunset-y">Make it warm and sunset-y</button>
      </div>
    </div>
    <div id="messages" class="messages"></div>
    <div id="status" class="status hidden"></div>
  </main>

  <footer class="composer">
    <textarea id="composer-input" rows="1" placeholder="Describe a tweak or a whole new theme..." aria-label="Message"></textarea>
    <div class="composer-bar">
      <button id="btn-provider" class="provider-badge" title="Change provider">No provider</button>
      <button id="btn-send" class="send-btn" title="Send (Enter)">Send</button>
      <button id="btn-stop" class="stop-btn hidden" title="Stop (Esc)">Stop</button>
    </div>
  </footer>

  <script nonce="${nonce}" src="${markedUri}"></script>
  <script nonce="${nonce}" src="${jsUri}"></script>
</body>
</html>
